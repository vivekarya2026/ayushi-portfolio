name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages on every push to
# main (and on manual dispatch). The site is Next.js `output: "export"`, so the
# job just runs `next build` and uploads the generated ./out folder.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # GITHUB_PAGES=true switches next.config to the /ayushi-portfolio basePath.
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Disable Jekyll (so the _next folder is served)
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
